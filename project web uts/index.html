<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumpukan - Materi Repository</title>
    <link rel="icon" href="./foto/icon.svg" type="image/svg+xml">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toggle Header Button -->
    <button id="header-toggle" aria-label="Toggle Header">
        <div class="toggle-shape"></div>
    </button>

    <!-- Slide-down Header -->
    <header id="main-header">
        <div class="header-content">
            <button id="scroll-to-top" class="header-btn">⬆ Scroll ke Atas</button>
            <button id="theme-toggle" class="header-btn">🌙 Dark Mode</button>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="hero" class="hero-section">
            <div class="hero-content">
                <div class="logo-container">
                    <img src="./foto/logo.svg" alt="Tumpukan Logo" class="logo">
                </div>
                <h1 class="hero-title">Berhenti tanya 'P, minta file materi dong' di grup kelas. Semua materi perkuliahan sudah tertata rapi di sini, tinggal klik dan pelajari.</h1>
                <button id="scroll-to-repo" class="primary-btn">Lihat Materi</button>
            </div>
            <div class="hero-image">
                <img src="./foto/hero-collage.png" alt="Collage Illustration" class="collage-asset">
            </div>
        </section>

        <!-- Repository Section -->
        <section id="repository" class="repo-section">
            <div class="repo-header">
                <h2>Materi Repository</h2>
            </div>
            <div class="course-grid" id="course-grid">
                <!-- Courses will be injected here by JS -->
            </div>
            <button id="add-course-btn" class="add-btn" aria-label="Tambah Mata Kuliah">+</button>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <a href="#" class="footer-link">Terms and Condition</a>
            <a href="https://wa.me/6283178396799" class="footer-link" target="_blank" rel="noopener noreferrer">Contact Info</a>
        </div>
    </footer>

    <!-- Overlay: Course Materials -->
    <div id="material-overlay" class="overlay">
        <div class="overlay-content">
            <button class="close-overlay" aria-label="Close">&times;</button>
            <h3 id="overlay-course-title">Nama Mata Kuliah</h3>
            <div id="material-list" class="material-list">
                <!-- Materials will be listed here -->
            </div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <p>Tidak ada materi apa pun di sini</p>
                <button id="show-add-material-form" class="primary-btn">Tambahkan Materi</button>
            </div>
            <button id="add-material-btn" class="primary-btn mt-4" style="display: none;">Tambahkan Materi Baru</button>
        </div>
    </div>

    <!-- Overlay: Add Material Form -->
    <div id="add-material-overlay" class="overlay">
        <div class="overlay-content">
            <button class="close-overlay" aria-label="Close">&times;</button>
            <h3>Tambah Materi Baru</h3>
            <form id="add-material-form">
                <div class="form-group">
                    <label for="material-name">Nama Materi</label>
                    <input type="text" id="material-name" required placeholder="Contoh: Pertemuan 1 - Pengantar">
                </div>
                <div class="form-group">
                    <label for="material-link">Link Materi (Google Drive)</label>
                    <input type="url" id="material-link" required placeholder="https://drive.google.com/...">
                </div>
                <button type="submit" class="primary-btn w-full">Masukkan Materi</button>
            </form>
        </div>
    </div>

    <!-- Overlay: Add Course Form -->
    <div id="add-course-overlay" class="overlay">
        <div class="overlay-content">
            <button class="close-overlay" aria-label="Close">&times;</button>
            <h3>Tambah Mata Kuliah Baru</h3>
            <form id="add-course-form">
                <div class="form-group">
                    <label for="course-name">Nama Mata Kuliah</label>
                    <input type="text" id="course-name" required placeholder="Contoh: Algoritma dan Pemrograman">
                </div>
                <button type="submit" class="primary-btn w-full">Masukkan Mata Kuliah</button>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification-toast" class="toast">
        <p id="toast-message">Berhasil!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
